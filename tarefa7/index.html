<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bichinho Virtual Lovecraftiano</title>
    
    <!-- Tailwind CSS e DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }
        
        .creature-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        
        .creature-image {
            max-width: 300px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        .food-button {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .food-button:hover {
            transform: scale(1.1);
        }
        
        .food-button:active {
            transform: scale(0.95);
        }
        
        .status-display {
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .info-card {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body style="
    background-image: url('fundo2.webp');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
" class="min-h-screen flex flex-col">
    
    <!-- Header com Avatar e Nome -->
    <div class="w-full flex items-center justify-between p-6 gap-4 bg-gradient-to-r from-purple-800 to-blue-800 shadow-lg">
        <div class="flex items-center gap-4">
            <div class="avatar">
                <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                    <img id="avatarImage" src="vivo.webp" alt="Avatar da criatura" />
                </div>
            </div>
            
            <div>
                <input 
                    type="text" 
                    id="creatureName"
                    placeholder="Nome da criatura..." 
                    class="input input-secondary input-sm"
                    value="Cósmico"
                />
                <p class="text-xs text-gray-300 mt-1">Bichinho Virtual Lovecraftiano</p>
            </div>
        </div>
        
        <!-- Toggle Dia/Noite -->
        <div class="flex items-center gap-3">
            <span class="text-sm text-gray-200">🌙 Noite</span>
            <input 
                type="checkbox" 
                id="dayNightToggle"
                class="toggle toggle-primary" 
            />
            <span class="text-sm text-gray-200">☀️ Dia</span>
        </div>
    </div>
    
    <!-- Área Principal da Criatura -->
    <div class="flex-1 flex flex-col items-center justify-center px-4">
        <div class="flex flex-col items-center mb-4">
            <!-- Balão de Fala do Ferlini -->
            <div id="balaoFerlini" class="chat chat-start hidden transition-all duration-500 transform scale-0">
                <div class="chat-bubble chat-bubble-accent shadow-xl font-bold text-lg">
                    Ferlini (Gostosinho) 😎 <br> <span class="text-sm font-normal text-white">+1 Ponto Extra!</span>
                </div>
            </div>
        </div>
        
        <div class="creature-container">
            <img 
                id="mainImage"
                src="vivo.webp"
                alt="Criatura"
                class="creature-image"
            />
        </div>
        
        <!-- Status da Criatura -->
        <div class="info-card rounded-lg p-6 mb-8 max-w-md w-full text-center">
            <p class="status-display text-white mb-4">
                Estado: <span id="statusText" class="text-yellow-300">Feliz</span>
            </p>
            
            <div class="flex justify-around mb-4">
                <div class="text-center">
                    <p class="text-xs text-gray-300">Fome</p>
                    <div class="progress progress-warning w-24 h-3">
                        <div id="hungerBar" class="progress-value" style="width: 30%"></div>
                    </div>
                </div>
                
                <div class="text-center">
                    <p class="text-xs text-gray-300">Energia</p>
                    <div class="progress progress-success w-24 h-3">
                        <div id="energyBar" class="progress-value" style="width: 80%"></div>
                    </div>
                </div>
            </div>
            
            <p class="text-sm text-gray-300">
                Tempo sem comer: <span id="timeCounter" class="font-bold text-orange-300">0s</span>
            </p>
        </div>
    </div>
    
    <!-- Área de Controle (Botão de Comida) -->
    <div class="w-full flex flex-col items-center justify-center pb-12 px-4">
        <p class="text-gray-300 mb-4 text-sm">Clique na comida para alimentar sua criatura!</p>
        
        <div class="flex justify-center">
            <img 
                id="btnImage"
                src="comida.webp"
                alt="Botão de Comida"
                class="food-button w-1/3 max-w-[180px] h-auto"
                onclick="alimentar()"
            />
        </div>
    </div>
    
    <!-- Footer -->
    <div class="w-full text-center py-4 bg-gradient-to-r from-purple-800 to-blue-800 text-gray-400 text-xs relative">
        <p>Bichinho Virtual © 2024 | <ezequiel-github>RussiaZ/front-end</ezequiel-github></p>
        
        <!-- BOTÃO ESCONDIDO (Quase invisível, no cantinho do footer) -->
        <button 
            id="btnEscondido" 
            onclick="revelarFerlini()" 
            class="absolute bottom-0 right-0 w-4 h-4 opacity-0 cursor-default hover:opacity-10 transition-opacity"
            title="???"
        ></button>
    </div>

    <!-- Modal ou Container para a Foto do Ferlini -->
    <div id="modalFerlini" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl transform transition-all scale-0" id="cardFerlini">
            <h2 class="text-2xl font-bold text-purple-700 mb-4">Ferlini (Gostosinho) 😎</h2>
            <div class="avatar mb-4">
                <div class="w-48 rounded-xl ring ring-primary ring-offset-base-100 ring-offset-2">
                    <!-- Aqui você deve colocar a foto do Ferlini (ex: ferlini.png) -->
                    <img src="gostosinho.jpeg" alt="Foto do Ferlini" />
                </div>
            </div>
            <p class="text-lg font-semibold text-gray-700 mb-6">VOCÊ GANHOU +1 PONTO EXTRA! 🌟</p>
            <button class="btn btn-primary w-full" onclick="fecharFerlini()">Fechar</button>
        </div>
    </div>
    
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
